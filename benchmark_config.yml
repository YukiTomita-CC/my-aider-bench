benchmark:
  threads: 4
  models_dir: /workspace/models
  benchmark_script: /workspace/aider/benchmark/benchmark.py
  server_bin: /workspace/llama.cpp/build/bin/llama-server
  server_health_url: http://localhost:8080/health
  server_health_timeout: 300  # seconds
  aider_dir: /workspace/aider
  results_dir: /workspace/benchmark-results

models:
