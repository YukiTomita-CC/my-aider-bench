  - name: devstral-small
    repo: unsloth/Devstral-Small-2-24B-Instruct-2512-GGUF
    gguf_filter: "*UD-Q4_K_XL*"
    alias: devstral-small
    server:
      extra_args: "--temp 0.15 --min-p 0.01 -c 131072 -ngl 99 --jinja -fa on --parallel 4"
    aider:
      num_ctx: 32768
      max_tokens: 8192

  - name: qwen36-27b
    repo: unsloth/Qwen3.6-27B-MTP-GGUF
    gguf_filter: "*UD-Q4_K_XL*"
    alias: qwen36-27b
    server:
      extra_args: "--temp 0.6 --top-p 0.95 --top-k 20 --presence-penalty 0.0 --repeat-penalty 1.0 --min-p 0.00 -c 131072 --spec-type draft-mtp --spec-draft-n-max 2 -ngl 99 --jinja -fa on --parallel 4 --reasoning on"
    aider:
      num_ctx: 32768
      max_tokens: 8192
 
