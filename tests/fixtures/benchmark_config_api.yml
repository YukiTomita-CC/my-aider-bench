benchmark:
  benchmark_script: /aider/benchmark/benchmark.py
  aider_dir: /aider
  results_dir: /workspace/benchmark-results

models:
  - name: gpt-5.2
    model_string: openai/gpt-5.2
    completed: true

  - name: gpt-5-mini
    model_string: openai/gpt-5-mini
    completed: true

  - name: gemini-3-flash-preview
